services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - 8080:8080
    volumes:
      - ./models:/models
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--embeddings"
      - "--models-dir" # Enables multiple models on one server
      - "/models"
      - "--models-max"
      - "1"
      - "-c"
      - "2048"
      - "--n-cpu-moe" # Offloads model processing to CPU
      - "12"
      - "--mlock" # Forces the system to keep model in RAM rather than swapping or compressing
      - "--verbose"

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.7
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --scheme
      - http
    ports:
      - 8081:8081
      - 50051:50051
    volumes:
      - /vector-db
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 8
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/vectordb"
      ENABLE_MODULES: "text2vec-openai,generative-openai"
      OPENAI_APIKEY: "not-needed"
      OPENAI_BASEURL: "http://llama-server:8080" # Removed the trailing slash
      CLUSTER_HOSTNAME: "node1"
